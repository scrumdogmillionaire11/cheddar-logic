name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      CHEDDAR_DB_PATH: /tmp/cheddar-logic/ci-safe.db
    steps:
      - name: Checkout
        # WI-0517: v5 uses Node.js 24 runtime (v4/Node.js 20 deprecated June 2026)
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            package-lock.json
            web/package-lock.json

      - name: Make scripts executable
        run: |
          chmod +x scripts/*.sh 2>/dev/null || true
          [ -e tests/*.sh ] && chmod +x tests/*.sh || echo "No test scripts to chmod"
          [ -e pax-agents/scripts/*.sh ] && chmod +x pax-agents/scripts/*.sh || true

      - name: Run doctor (self)
        run: |
          if [ -f ./scripts/doctor.sh ]; then
            ./scripts/doctor.sh .
          elif [ -f ./pax-agents/scripts/doctor.sh ]; then
            ./pax-agents/scripts/doctor.sh ./pax-agents
          else
            echo "doctor.sh not found, skipping validation"
          fi

      - name: Run link integrity checks
        run: |
          if [ -f ./tests/link-integrity.sh ]; then
            ./tests/link-integrity.sh .
          elif [ -f ./pax-agents/tests/link-integrity.sh ]; then
            ./pax-agents/tests/link-integrity.sh .
          else
            echo "link-integrity.sh not found, skipping validation"
          fi

      - name: Forbid inline DB DDL in data db modules
        run: |
          if grep -R -nE "db\.exec.*(ALTER TABLE|CREATE TABLE)" packages/data/src/db --include="*.js"; then
            echo "Inline DDL via db.exec is forbidden in packages/data/src/db"
            exit 1
          fi

      - name: Install workspace and web test dependencies
        run: |
          npm ci
          npm --prefix web ci

      - name: Run deterministic web smoke gate
        run: npm --prefix web run test:ci:smoke

      - name: Run packages/models tests (feature correlation gate)
        run: npm --prefix packages/models test

      - name: check-db-import-boundaries
        run: node scripts/check-db-imports.js

  web-results-performance-budget:
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      CHEDDAR_DB_PATH: /tmp/cheddar-logic/ci-safe.db
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            package-lock.json
            web/package-lock.json

      - name: Install workspace and web test dependencies
        run: |
          npm ci
          npm --prefix web ci

      - name: Run non-blocking results performance budget gate
        run: npm --prefix web run test:api:results:performance-budget

  worker-tests:
    runs-on: ubuntu-latest
    env:
      CHEDDAR_DB_PATH: /tmp/cheddar-logic/ci-safe.db
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install workspace dependencies
        run: npm ci

      - name: Run worker tests
        run: npm --prefix apps/worker test

      - name: Feature correlation gate
        run: npm --prefix apps/worker test -- --testPathPattern="feature-correlation"
