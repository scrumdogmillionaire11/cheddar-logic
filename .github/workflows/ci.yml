name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      CHEDDAR_DB_PATH: /tmp/cheddar-logic/ci-safe.db
    steps:
      - name: Checkout
        # WI-0517: v5 uses Node.js 24 runtime (v4/Node.js 20 deprecated June 2026)
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            packages/data/package-lock.json
            packages/models/package-lock.json
            web/package-lock.json

      - name: Make scripts executable
        run: |
          chmod +x scripts/*.sh 2>/dev/null || true
          [ -e tests/*.sh ] && chmod +x tests/*.sh || echo "No test scripts to chmod"
          [ -e pax-agents/scripts/*.sh ] && chmod +x pax-agents/scripts/*.sh || true

      - name: Run doctor (self)
        run: |
          if [ -f ./scripts/doctor.sh ]; then
            ./scripts/doctor.sh .
          elif [ -f ./pax-agents/scripts/doctor.sh ]; then
            ./pax-agents/scripts/doctor.sh .
          else
            echo "doctor.sh not found, skipping validation"
          fi

      - name: Run link integrity checks
        run: |
          if [ -f ./tests/link-integrity.sh ]; then
            ./tests/link-integrity.sh .
          elif [ -f ./pax-agents/tests/link-integrity.sh ]; then
            ./pax-agents/tests/link-integrity.sh .
          else
            echo "link-integrity.sh not found, skipping validation"
          fi

      - name: Install scoped web test dependencies
        run: |
          npm --prefix packages/data ci
          npm --prefix packages/models ci
          npm --prefix web ci

      - name: Run deterministic web smoke gate
        run: npm --prefix web run test:ci:smoke

      - name: check-db-import-boundaries
        run: node scripts/check-db-imports.js

  worker-tests:
    runs-on: ubuntu-latest
    env:
      CHEDDAR_DB_PATH: /tmp/cheddar-logic/ci-safe.db
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            apps/worker/package-lock.json
            packages/data/package-lock.json
            packages/adapters/package-lock.json
            packages/models/package-lock.json
            packages/odds/package-lock.json

      - name: Install local package dependencies
        run: |
          npm --prefix packages/data ci
          npm --prefix packages/adapters ci
          npm --prefix packages/models ci
          npm --prefix packages/odds ci

      - name: Install worker dependencies
        run: npm --prefix apps/worker ci

      - name: Run worker tests
        run: npm --prefix apps/worker test
