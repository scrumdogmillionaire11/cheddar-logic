name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.11'

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install package dependencies
        run: |
          npm --prefix packages/data install
          npm --prefix packages/models install
          npm --prefix packages/adapters install
          npm --prefix packages/odds install

      - name: Install web dependencies
        run: npm --prefix web install --include=dev

      - name: Lint web
        run: npm --prefix web run lint

      - name: Build web
        run: npm --prefix web run build

  deploy-web-vercel:
    name: Deploy Web (Vercel)
    needs: lint-and-test
    runs-on: ubuntu-latest
    # Note: Vercel GitHub integration handles auto-deploy
    # This job is optional and can be removed if using Vercel's native integration
    if: false  # Disabled by default - enable if you want manual GitHub Actions deploys
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
          working-directory: ./web

  deploy-backend-railway:
    name: Deploy Backend (Railway)
    needs: lint-and-test
    runs-on: ubuntu-latest
    # Enable this if using Railway with GitHub integration
    if: false  # Disabled by default
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Railway
        run: |
          echo "Railway deployment via GitHub app"
          echo "Configure at: https://railway.app/project/[your-project]/settings"

  deploy-worker-pi:
    name: Deploy Worker (Raspberry Pi)
    needs: lint-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: SSH deploy to Pi
        uses: appleboy/ssh-action@v1.0.3
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
        with:
          host: ${{ secrets.PI_HOST }}
          username: ${{ secrets.PI_USER }}
          key: ${{ secrets.PI_SSH_KEY }}
          port: 22
          command_timeout: 20m
          envs: CF_API_TOKEN,CF_ZONE_ID
          script: |
            set -e
            cd /opt/cheddar-logic
            git fetch origin main
            git reset --hard origin/main
            sudo cp /opt/cheddar-logic/cheddar-worker.service /etc/systemd/system/cheddar-worker.service
            sudo cp /opt/cheddar-logic/cheddar-web.service /etc/systemd/system/cheddar-web.service
            sudo cp /opt/cheddar-logic/cheddar-fpl-sage.service /etc/systemd/system/cheddar-fpl-sage.service
            sudo systemctl daemon-reload
            sudo systemctl enable cheddar-worker cheddar-web cheddar-fpl-sage
            # Clean node_modules to avoid corrupted tar state from stale backups
            rm -rf packages/*/node_modules apps/*/node_modules web/node_modules
            # Install dependencies
            npm --prefix packages/data install --omit=dev
            npm --prefix packages/models install --omit=dev
            npm --prefix packages/adapters install --omit=dev
            npm --prefix packages/odds install --omit=dev
            npm --prefix apps/worker install --omit=dev
            npm --prefix web install --include=dev
            # Resolve canonical DB path from prod env (supports CHEDDAR_DB_PATH or CHEDDAR_DATA_DIR)
            set -a; . /opt/cheddar-logic/.env.production; set +a
            if [ -z "${CHEDDAR_DB_PATH:-}" ] && [ -z "${CHEDDAR_DATA_DIR:-}" ]; then
              echo "ERROR: Neither CHEDDAR_DB_PATH nor CHEDDAR_DATA_DIR set in /opt/cheddar-logic/.env.production"
              exit 1
            fi
            # Resolve the actual database path (with timeout to prevent hanging)
            echo "Resolving database path..."
            TIMEOUT=5
            CANONICAL_DB_PATH=$(timeout $TIMEOUT node -e "const { resolveDatabasePath } = require('/opt/cheddar-logic/packages/data/src/db-path'); const result = resolveDatabasePath(); console.log(result.dbPath);" 2>&1 || echo "")
            if [ -z "$CANONICAL_DB_PATH" ] || [ "$CANONICAL_DB_PATH" = "timeout" ]; then
              # Fallback: if path resolution times out or fails, use explicit fallback
              if [ -n "${CHEDDAR_DB_PATH:-}" ]; then
                CANONICAL_DB_PATH="$CHEDDAR_DB_PATH"
                echo "Path resolution timed out, using CHEDDAR_DB_PATH: $CANONICAL_DB_PATH"
              elif [ -n "${CHEDDAR_DATA_DIR:-}" ]; then
                CANONICAL_DB_PATH="${CHEDDAR_DATA_DIR}/cheddar.db"
                echo "Path resolution timed out, using fallback: $CANONICAL_DB_PATH"
              else
                echo "ERROR: Could not resolve database path"
                exit 1
              fi
            else
              echo "Resolved database path: $CANONICAL_DB_PATH"
            fi
            sudo mkdir -p "$(dirname "$CANONICAL_DB_PATH")"
            sudo chown $(id -u):$(id -g) "$(dirname "$CANONICAL_DB_PATH")"
            # Ensure proper permissions if DB exists
            if [ -f "$CANONICAL_DB_PATH" ]; then
              chmod 664 "$CANONICAL_DB_PATH"
            fi
            # Stop worker before migrations to prevent concurrent writes to DB file
            sudo systemctl stop cheddar-worker || true
            # Run database migrations (will create DB if it doesn't exist)
            echo "Running migrations against: $CANONICAL_DB_PATH"
            CHEDDAR_DB_PATH="$CANONICAL_DB_PATH" NODE_ENV=production timeout 10m node scripts/run-migrations.js || { echo "ERROR: Migrations failed or timed out"; exit 1; }
            sudo apt-get update -y
            sudo apt-get install -y sqlite3
            # Fail deploy if expected schema is missing from production DB
            test -s "$CANONICAL_DB_PATH" || { echo "ERROR: missing or empty canonical DB after migrations: $CANONICAL_DB_PATH"; exit 1; }
            sqlite3 "$CANONICAL_DB_PATH" "SELECT name FROM sqlite_master WHERE type='table' AND name='card_payloads';" | grep -qx "card_payloads" || { echo "ERROR: required table card_payloads missing after migrations"; exit 1; }
            sudo rm -rf web/.next
            grep -E '^[A-Za-z_][A-Za-z0-9_]*=' /opt/cheddar-logic/.env.production > /tmp/cheddar_build_env
            set -a && source /tmp/cheddar_build_env && set +a && npm --prefix web run build
            rm -f /tmp/cheddar_build_env
            test -f web/.next/BUILD_ID || { echo "ERROR: next build did not produce web/.next/BUILD_ID"; exit 1; }
            test -d web/.next/static || { echo "ERROR: next build did not produce web/.next/static directory"; exit 1; }
            CHUNK_COUNT=$(find web/.next/static/chunks -name "*.js" 2>/dev/null | wc -l)
            test "$CHUNK_COUNT" -gt 0 || { echo "ERROR: next build produced no JS chunks (found: $CHUNK_COUNT)"; exit 1; }
            CSS_COUNT=$(find web/.next/static \( -path "*/chunks/*.css" -o -path "*/css/*.css" \) 2>/dev/null | wc -l)
            test "$CSS_COUNT" -gt 0 || { echo "ERROR: next build produced no static CSS assets — styles will not load"; exit 1; }
            SAMPLE_CHUNK_FILE=$(find web/.next/static/chunks -name "*.js" | sort | head -n 1)
            test -n "$SAMPLE_CHUNK_FILE" || { echo "ERROR: unable to select a sample JS chunk from web/.next/static/chunks"; exit 1; }
            SAMPLE_CHUNK_REL="${SAMPLE_CHUNK_FILE#web/.next/static/chunks/}"
            echo "Selected sample chunk: /_next/static/chunks/$SAMPLE_CHUNK_REL"
            SAMPLE_CSS_FILE=$(find web/.next/static \( -path "*/chunks/*.css" -o -path "*/css/*.css" \) | sort | head -n 1)
            test -n "$SAMPLE_CSS_FILE" || { echo "ERROR: unable to select a sample CSS asset from web/.next/static"; exit 1; }
            SAMPLE_CSS_REL="${SAMPLE_CSS_FILE#web/.next/static/}"
            echo "Selected sample CSS: /_next/static/$SAMPLE_CSS_REL"
            echo "Build verification passed: BUILD_ID exists, static dir exists, $CHUNK_COUNT JS chunks, $CSS_COUNT CSS chunks found"
            sudo systemctl restart cheddar-worker
            sudo systemctl restart cheddar-web
            sudo systemctl restart cheddar-fpl-sage
            sleep 5
            retry_url() {
              local url="$1"
              local label="$2"
              local attempts=12
              local delay=3
              local status=""
              for i in $(seq 1 "$attempts"); do
                status=$(curl -sS -o /dev/null -w "%{http_code}" "$url" || true)
                if [ "$status" = "200" ]; then
                  echo "$label ok (status=$status)"
                  return 0
                fi
                echo "$label not ready (status=$status) attempt $i/$attempts"
                sleep "$delay"
              done
              echo "$label failed after $attempts attempts (last status=$status): $url"
              return 1
            }
            retry_url "http://127.0.0.1:3000/_next/static/chunks/$SAMPLE_CHUNK_REL" "origin sample chunk" || { sudo journalctl -u cheddar-web -n 80 --no-pager || true; exit 1; }
            retry_url "http://127.0.0.1:3000/_next/static/$SAMPLE_CSS_REL" "origin sample css" || { sudo journalctl -u cheddar-web -n 80 --no-pager || true; exit 1; }
            HOMEPAGE_HTML=$(curl -fsS "http://127.0.0.1:3000/" || true)
            REFERENCED_CHUNK=$(printf "%s" "$HOMEPAGE_HTML" | grep -Eo "/_next/static/chunks/[^\"' ]+\.js" | head -n 1)
            test -n "$REFERENCED_CHUNK" || { echo "ERROR: could not find a chunk reference in homepage HTML after restart"; sudo journalctl -u cheddar-web -n 80 --no-pager || true; exit 1; }
            REFERENCED_CSS=$(printf "%s" "$HOMEPAGE_HTML" | grep -Eo "/_next/static/[^\"' ]+\.css" | head -n 1)
            test -n "$REFERENCED_CSS" || { echo "ERROR: could not find a CSS chunk reference in homepage HTML after restart"; sudo journalctl -u cheddar-web -n 80 --no-pager || true; exit 1; }
            retry_url "http://127.0.0.1:3000$REFERENCED_CHUNK" "origin homepage chunk" || { sudo journalctl -u cheddar-web -n 80 --no-pager || true; exit 1; }
            retry_url "http://127.0.0.1:3000$REFERENCED_CSS" "origin homepage css" || { sudo journalctl -u cheddar-web -n 80 --no-pager || true; exit 1; }
            if [ -z "${CF_API_TOKEN:-}" ] || [ -z "${CF_ZONE_ID:-}" ]; then
              echo "ERROR: Cloudflare secrets missing (CF_API_TOKEN and CF_ZONE_ID required for cache purge)";
              exit 1;
            fi
            curl -sS -X POST "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/purge_cache" \
              -H "Authorization: Bearer ${CF_API_TOKEN}" \
              -H "Content-Type: application/json" \
              --data '{"purge_everything":true}' \
              | tee /tmp/cloudflare_purge.json
            grep -q '"success": true' /tmp/cloudflare_purge.json || { echo "ERROR: Cloudflare purge failed"; cat /tmp/cloudflare_purge.json; exit 1; }
            echo "Cloudflare cache purged (everything) — waiting 30s for propagation..."
            sleep 30
            PUBLIC_DOMAIN_URL="${NEXT_PUBLIC_PUBLIC_DOMAIN:-${PUBLIC_DOMAIN:-https://cheddarlogic.com}}"
            retry_url "$PUBLIC_DOMAIN_URL$REFERENCED_CHUNK" "public homepage chunk" || { echo "ERROR: public chunk request failed after restart"; exit 1; }
            retry_url "$PUBLIC_DOMAIN_URL$REFERENCED_CSS" "public homepage css" || { echo "ERROR: public css request failed after restart"; exit 1; }
            echo "Chunk verification passed: origin and public domain serve homepage-referenced assets"
            node -e "const u=['http://127.0.0.1:3000/api/games','http://127.0.0.1:3000/api/cards?limit=5','http://127.0.0.1:3000/api/results?limit=20']; (async()=>{const out={}; for (const x of u){const r=await fetch(x); const j=await r.json(); out[x]={status:r.status,games:Array.isArray(j?.data)?j.data.length:undefined,cards:Array.isArray(j?.data)?j.data.length:undefined,ledger:Array.isArray(j?.data?.ledger)?j.data.ledger.length:undefined,summary:j?.data?.summary||null};} console.log('post_restart_snapshot', JSON.stringify(out)); })().catch(e=>{console.error('post_restart_snapshot_error', e); process.exit(0);});"
            echo "Deploy complete — worker, web, and fpl-sage restarted"
