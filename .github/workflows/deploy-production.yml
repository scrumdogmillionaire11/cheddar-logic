name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: '24'
  PYTHON_VERSION: '3.11'

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      # WI-0517: v5 uses Node.js 24 runtime (v4/Node.js 20 deprecated June 2026)
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install package dependencies
        run: |
          npm --prefix packages/data install
          npm --prefix packages/models install
          npm --prefix packages/adapters install
          npm --prefix packages/odds install

      - name: Install web dependencies
        run: npm --prefix web install --include=dev

      - name: Lint web
        run: npm --prefix web run lint

      - name: Build web
        run: npm --prefix web run build

  deploy-web-vercel:
    name: Deploy Web (Vercel)
    needs: lint-and-test
    runs-on: ubuntu-latest
    # Note: Vercel GitHub integration handles auto-deploy
    # This job is optional and can be removed if using Vercel's native integration
    if: false  # Disabled by default - enable if you want manual GitHub Actions deploys
    steps:
      - uses: actions/checkout@v5  # WI-0517: Node 24 runtime
      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
          working-directory: ./web

  deploy-backend-railway:
    name: Deploy Backend (Railway)
    needs: lint-and-test
    runs-on: ubuntu-latest
    # Enable this if using Railway with GitHub integration
    if: false  # Disabled by default
    steps:
      - uses: actions/checkout@v5  # WI-0517: Node 24 runtime
      - name: Deploy to Railway
        run: |
          echo "Railway deployment via GitHub app"
          echo "Configure at: https://railway.app/project/[your-project]/settings"

  deploy-worker-pi:
    name: Deploy Worker (Raspberry Pi)
    needs: lint-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5  # WI-0517: Node 24 runtime

      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: SSH deploy to Pi
        uses: appleboy/ssh-action@v1.0.3
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
        with:
          host: ${{ secrets.PI_HOST }}
          username: ${{ secrets.PI_USER }}
          key: ${{ secrets.PI_SSH_KEY }}
          port: 22
          command_timeout: 20m
          envs: CF_API_TOKEN,CF_ZONE_ID
          script: |
            set -e
            cd /opt/cheddar-logic
            git fetch origin main
            git reset --hard origin/main
            sudo cp /opt/cheddar-logic/deploy/systemd/cheddar-worker.service /etc/systemd/system/cheddar-worker.service
            sudo cp /opt/cheddar-logic/deploy/systemd/cheddar-web.service /etc/systemd/system/cheddar-web.service
            sudo cp /opt/cheddar-logic/deploy/systemd/cheddar-fpl-sage.service /etc/systemd/system/cheddar-fpl-sage.service
            sudo systemctl daemon-reload
            sudo systemctl enable cheddar-worker cheddar-web cheddar-fpl-sage
            # ── Disk hygiene before installs ───────────────────────────────────
            # Abort early with a clear message if available disk is critically low.
            AVAIL_KB=$(df /opt --output=avail | tail -1)
            echo "Disk available before cleanup: ${AVAIL_KB}KB"
            # Remove rollback snapshot from previous deploy (can be 100–300 MB)
            rm -rf /tmp/cheddar-prev-next-full || true
            # Prune Next.js static archive: keep only the 3 most recent snapshots
            ARCHIVE_ROOT="/opt/cheddar-logic/.next-static-archive"
            if [ -d "$ARCHIVE_ROOT" ]; then
              ARCHIVE_COUNT=$(find "$ARCHIVE_ROOT" -mindepth 1 -maxdepth 1 -type d | wc -l)
              if [ "$ARCHIVE_COUNT" -gt 3 ]; then
                PRUNE=$(( ARCHIVE_COUNT - 3 ))
                find "$ARCHIVE_ROOT" -mindepth 1 -maxdepth 1 -type d | sort | head -n "$PRUNE" | xargs rm -rf
                echo "Pruned $PRUNE old static archive snapshot(s)"
              fi
            fi
            # Clear npm cache to reclaim space from partial/failed installs
            npm cache clean --force 2>/dev/null || true
            # Clear npm user-level cache (~/.npm/_cacache can grow to several GB)
            rm -rf ~/.npm/_cacache 2>/dev/null || true
            # Trim systemd journal to 50 MB
            sudo journalctl --vacuum-size=50M 2>/dev/null || true
            # Remove apt cache
            sudo apt-get clean 2>/dev/null || true
            # Rotate deploy.log — keep the last 500 lines if it has grown large
            DEPLOY_LOG_PATH="/opt/cheddar-logic/logs/deploy.log"
            if [ -f "$DEPLOY_LOG_PATH" ] && [ "$(wc -c < "$DEPLOY_LOG_PATH")" -gt 5242880 ]; then
              tail -500 "$DEPLOY_LOG_PATH" > "${DEPLOY_LOG_PATH}.tmp" && mv "${DEPLOY_LOG_PATH}.tmp" "$DEPLOY_LOG_PATH"
              echo "Rotated deploy.log (trimmed to last 500 lines)"
            fi
            # Rotate scheduler.log — keep the last 2000 lines if it has grown large
            SCHED_LOG_PATH="/opt/cheddar-logic/apps/worker/logs/scheduler.log"
            if [ -f "$SCHED_LOG_PATH" ] && [ "$(wc -c < "$SCHED_LOG_PATH")" -gt 52428800 ]; then
              tail -2000 "$SCHED_LOG_PATH" > "${SCHED_LOG_PATH}.tmp" && mv "${SCHED_LOG_PATH}.tmp" "$SCHED_LOG_PATH"
              echo "Rotated scheduler.log (trimmed to last 2000 lines)"
            fi
            # Remove stale test database artifacts left in /tmp from CI or manual runs
            find /tmp -maxdepth 1 \( -name "cheddar-test-*.db" -o -name "cheddar-test-*.db.lock" -o -name "cheddar-db-backup-*" \) -mtime +0 -exec rm -rf {} + 2>/dev/null || true
            # Clear Python pip cache if present
            pip3 cache purge 2>/dev/null || true
            AVAIL_KB_AFTER=$(df /opt --output=avail | tail -1)
            echo "Disk available after cleanup: ${AVAIL_KB_AFTER}KB"
            if [ "$AVAIL_KB_AFTER" -lt 524288 ]; then
              echo "ERROR: Less than 512 MB free after cleanup (${AVAIL_KB_AFTER}KB) — aborting to prevent partial install"
              exit 1
            fi
            # ───────────────────────────────────────────────────────────────────
            # Clean node_modules to avoid corrupted tar state from stale backups.
            # web/node_modules is intentionally excluded: better-sqlite3 uses
            # prebuild-install to download an ARM binary from GitHub Releases
            # on every full wipe, and that download hangs indefinitely on the Pi.
            # Instead we do a hash-gated incremental install for web: wipe only
            # when package-lock.json has changed since last deploy.
            rm -rf packages/*/node_modules apps/*/node_modules
            # Install dependencies
            npm --prefix packages/data install --omit=dev
            npm --prefix packages/models install --omit=dev
            npm --prefix packages/adapters install --omit=dev
            npm --prefix packages/odds install --omit=dev
            npm --prefix apps/worker install --omit=dev
            # Web: only wipe node_modules when the lockfile changed — prevents
            # better-sqlite3 from re-downloading its ARM prebuild on every deploy.
            WEB_LOCK_HASH=$(md5sum web/package-lock.json | awk '{print $1}')
            WEB_LOCK_STAMP="/opt/cheddar-logic/.web-node-modules-lock-hash"
            if [ -f "$WEB_LOCK_STAMP" ] && [ "$(cat "$WEB_LOCK_STAMP")" = "$WEB_LOCK_HASH" ] && [ -d "web/node_modules" ]; then
              echo "web/package-lock.json unchanged — running incremental install (--prefer-offline)"
              npm --prefix web install --include=dev --prefer-offline
            else
              echo "web/package-lock.json changed or node_modules absent — full install (build-from-source=better-sqlite3)"
              rm -rf web/node_modules
              # Force better-sqlite3 to compile from source rather than letting
              # prebuild-install fetch an ARM binary from GitHub Releases, which
              # hangs indefinitely on the Pi. Compiling takes ~2-5 min on ARM
              # but always completes; the GitHub download silently stalls forever.
              npm --prefix web install --include=dev --build-from-source=better-sqlite3
              echo "$WEB_LOCK_HASH" > "$WEB_LOCK_STAMP"
            fi
            # Resolve canonical DB path from prod env (supports CHEDDAR_DB_PATH or CHEDDAR_DATA_DIR)
            set -a; . /opt/cheddar-logic/.env.production; set +a
            if [ -z "${CHEDDAR_DB_PATH:-}" ] && [ -z "${CHEDDAR_DATA_DIR:-}" ]; then
              echo "ERROR: Neither CHEDDAR_DB_PATH nor CHEDDAR_DATA_DIR set in /opt/cheddar-logic/.env.production"
              exit 1
            fi
            # Resolve the actual database path (with timeout to prevent hanging)
            echo "Resolving database path..."
            TIMEOUT=5
            CANONICAL_DB_PATH=$(timeout $TIMEOUT node -e "const { resolveDatabasePath } = require('/opt/cheddar-logic/packages/data/src/db-path'); const result = resolveDatabasePath(); console.log(result.dbPath);" 2>&1 || echo "")
            if [ -z "$CANONICAL_DB_PATH" ] || [ "$CANONICAL_DB_PATH" = "timeout" ]; then
              # Fallback: if path resolution times out or fails, use explicit fallback.
              # IMPORTANT: CHEDDAR_DB_PATH must always be set in .env.production.
              # The CHEDDAR_DATA_DIR branch is intentionally removed: it previously
              # constructed "${CHEDDAR_DATA_DIR}/cheddar.db" which is WRONG when the
              # production DB is named cheddar-prod.db. Never guess the filename.
              if [ -n "${CHEDDAR_DB_PATH:-}" ]; then
                CANONICAL_DB_PATH="$CHEDDAR_DB_PATH"
                echo "Path resolution timed out, using CHEDDAR_DB_PATH: $CANONICAL_DB_PATH"
              else
                echo "ERROR: Could not resolve database path. CHEDDAR_DB_PATH must be set in .env.production."
                exit 1
              fi
            else
              echo "Resolved database path: $CANONICAL_DB_PATH"
            fi
            sudo mkdir -p "$(dirname "$CANONICAL_DB_PATH")"
            sudo chown $(id -u):$(id -g) "$(dirname "$CANONICAL_DB_PATH")"
            # Ensure proper permissions if DB exists
            if [ -f "$CANONICAL_DB_PATH" ]; then
              chmod 664 "$CANONICAL_DB_PATH"
            fi
            # Stop worker before migrations to prevent concurrent writes to DB file
            # Stop PM2-managed processes first (Pi may still be using PM2 before systemd takeover)
            PM2_BIN=$(find /home -name pm2 -path "*/bin/pm2" 2>/dev/null | head -1 || true)
            if [ -n "$PM2_BIN" ]; then
              "$PM2_BIN" stop all || true
            fi
            sudo systemctl stop cheddar-worker || true
            # Remove stale lock file in case worker didn't exit cleanly
            rm -f "${CANONICAL_DB_PATH}.lock"
            # Run database migrations (will create DB if it doesn't exist)
            echo "Running migrations against: $CANONICAL_DB_PATH"
            CHEDDAR_DB_PATH="$CANONICAL_DB_PATH" NODE_ENV=production timeout 10m node scripts/run-migrations.js || { echo "ERROR: Migrations failed or timed out"; exit 1; }
            sudo apt-get update -y
            sudo apt-get install -y sqlite3
            # Fail deploy if expected schema is missing from production DB
            test -s "$CANONICAL_DB_PATH" || { echo "ERROR: missing or empty canonical DB after migrations: $CANONICAL_DB_PATH"; exit 1; }
            TABLE_CHECK_OK=0
            TABLE_CHECK_OUTPUT=""
            for attempt in $(seq 1 10); do
              TABLE_CHECK_OUTPUT=$(sqlite3 "$CANONICAL_DB_PATH" "PRAGMA busy_timeout=5000; SELECT name FROM sqlite_master WHERE type='table' AND name='card_payloads';" 2>&1 || true)
              if printf '%s\n' "$TABLE_CHECK_OUTPUT" | grep -qx "card_payloads"; then
                TABLE_CHECK_OK=1
                break
              fi
              if printf '%s' "$TABLE_CHECK_OUTPUT" | grep -qi "database is locked"; then
                echo "Schema check waiting for DB lock to clear (attempt $attempt/10)..."
                sleep 2
                continue
              fi
              if [ -n "$TABLE_CHECK_OUTPUT" ]; then
                echo "ERROR: sqlite schema check failed: $TABLE_CHECK_OUTPUT"
                exit 1
              fi
              break
            done
            if [ "$TABLE_CHECK_OK" -ne 1 ]; then
              if printf '%s' "$TABLE_CHECK_OUTPUT" | grep -qi "database is locked"; then
                echo "ERROR: database remained locked while verifying schema after migrations"
              else
                echo "ERROR: required table card_payloads missing after migrations"
              fi
              exit 1
            fi
            PREV_NEXT_ROLLBACK="/tmp/cheddar-prev-next-full"
            NEXT_STATIC_ARCHIVE_ROOT="/opt/cheddar-logic/.next-static-archive"
            NEXT_STATIC_RETENTION_DAYS=14
            NEXT_STATIC_MAX_SNAPSHOTS=20
            PREV_ARCHIVED_ASSET_REL=""
            ROLLBACK_READY=0

            rm -rf "$PREV_NEXT_ROLLBACK"
            if [ -d web/.next ]; then
              cp -a web/.next "$PREV_NEXT_ROLLBACK"
              ROLLBACK_READY=1
              echo "Captured rollback snapshot for previous .next directory"
            fi

            mkdir -p "$NEXT_STATIC_ARCHIVE_ROOT"
            SNAPSHOT_ID="$(date -u +%Y%m%dT%H%M%SZ)"
            SNAPSHOT_DIR="$NEXT_STATIC_ARCHIVE_ROOT/$SNAPSHOT_ID"
            if [ -d web/.next/static ]; then
              mkdir -p "$SNAPSHOT_DIR/static"
              cp -a web/.next/static/. "$SNAPSHOT_DIR/static"/
              if [ -f web/.next/BUILD_ID ]; then
                cp web/.next/BUILD_ID "$SNAPSHOT_DIR/BUILD_ID"
              fi
              PREV_STATIC_COUNT=$(find "$SNAPSHOT_DIR/static" -type f | wc -l)
              echo "Archived previous Next static assets at $SNAPSHOT_DIR (files=$PREV_STATIC_COUNT)"
              PREV_ARCHIVED_ASSET_FILE=$(find "$SNAPSHOT_DIR/static" -type f \( -name "*.js" -o -name "*.css" \) | sort | head -n 1)
              if [ -n "$PREV_ARCHIVED_ASSET_FILE" ]; then
                PREV_ARCHIVED_ASSET_REL="${PREV_ARCHIVED_ASSET_FILE#"$SNAPSHOT_DIR/static/"}"
                echo "Selected previous-release asset for retention check: /_next/static/$PREV_ARCHIVED_ASSET_REL"
              fi
            fi

            find "$NEXT_STATIC_ARCHIVE_ROOT" -mindepth 1 -maxdepth 1 -type d -mtime +"$NEXT_STATIC_RETENTION_DAYS" -exec rm -rf {} + || true
            SNAPSHOT_TOTAL=$(find "$NEXT_STATIC_ARCHIVE_ROOT" -mindepth 1 -maxdepth 1 -type d | wc -l)
            if [ "$SNAPSHOT_TOTAL" -gt "$NEXT_STATIC_MAX_SNAPSHOTS" ]; then
              PRUNE_COUNT=$((SNAPSHOT_TOTAL - NEXT_STATIC_MAX_SNAPSHOTS))
              find "$NEXT_STATIC_ARCHIVE_ROOT" -mindepth 1 -maxdepth 1 -type d | sort | head -n "$PRUNE_COUNT" | while IFS= read -r stale_dir; do
                [ -n "$stale_dir" ] || continue
                rm -rf "$stale_dir"
              done
            fi

            sudo rm -rf web/.next
            grep -E '^[A-Za-z_][A-Za-z0-9_]*=' /opt/cheddar-logic/.env.production > /tmp/cheddar_build_env
            set -a && . /tmp/cheddar_build_env && set +a && npm --prefix web run build
            rm -f /tmp/cheddar_build_env
            # Keep recent static assets available to reduce stale-client chunk/css 404s during rollout.
            if [ -d "$NEXT_STATIC_ARCHIVE_ROOT" ]; then
              mkdir -p web/.next/static
              find "$NEXT_STATIC_ARCHIVE_ROOT" -mindepth 1 -maxdepth 1 -type d | sort | tail -n "$NEXT_STATIC_MAX_SNAPSHOTS" | while IFS= read -r archive_dir; do
                [ -d "$archive_dir/static" ] || continue
                cp -an "$archive_dir/static"/. web/.next/static/ || true
              done
            fi
            test -f web/.next/BUILD_ID || { echo "ERROR: next build did not produce web/.next/BUILD_ID"; exit 1; }
            test -d web/.next/static || { echo "ERROR: next build did not produce web/.next/static directory"; exit 1; }
            CHUNK_COUNT=$(find web/.next/static/chunks -name "*.js" 2>/dev/null | wc -l)
            test "$CHUNK_COUNT" -gt 0 || { echo "ERROR: next build produced no JS chunks (found: $CHUNK_COUNT)"; exit 1; }
            CSS_COUNT=$(find web/.next/static \( -path "*/chunks/*.css" -o -path "*/css/*.css" \) 2>/dev/null | wc -l)
            test "$CSS_COUNT" -gt 0 || { echo "ERROR: next build produced no static CSS assets — styles will not load"; exit 1; }
            SAMPLE_CHUNK_FILE=$(find web/.next/static/chunks -name "*.js" | sort | head -n 1)
            test -n "$SAMPLE_CHUNK_FILE" || { echo "ERROR: unable to select a sample JS chunk from web/.next/static/chunks"; exit 1; }
            SAMPLE_CHUNK_REL="${SAMPLE_CHUNK_FILE#web/.next/static/chunks/}"
            echo "Selected sample chunk: /_next/static/chunks/$SAMPLE_CHUNK_REL"
            SAMPLE_CSS_FILE=$(find web/.next/static \( -path "*/chunks/*.css" -o -path "*/css/*.css" \) | sort | head -n 1)
            test -n "$SAMPLE_CSS_FILE" || { echo "ERROR: unable to select a sample CSS asset from web/.next/static"; exit 1; }
            SAMPLE_CSS_REL="${SAMPLE_CSS_FILE#web/.next/static/}"
            echo "Selected sample CSS: /_next/static/$SAMPLE_CSS_REL"
            echo "Build verification passed: BUILD_ID exists, static dir exists, $CHUNK_COUNT JS chunks, $CSS_COUNT CSS chunks found"
            echo "=== Post-build disk / memory ===" && df -h /opt && free -h || true
            sudo systemctl restart cheddar-worker
            sudo systemctl restart cheddar-web
            sudo systemctl restart cheddar-fpl-sage || { echo "WARNING: cheddar-fpl-sage failed to restart — continuing deploy (web/worker unaffected)"; true; }
            sleep 5
            restore_previous_next() {
              if [ "$ROLLBACK_READY" != "1" ] || [ ! -d "$PREV_NEXT_ROLLBACK" ]; then
                echo "Rollback snapshot unavailable; skipping .next restore"
                return
              fi
              echo "Restoring previous .next snapshot and restarting cheddar-web..."
              rm -rf web/.next
              cp -a "$PREV_NEXT_ROLLBACK" web/.next
              sudo systemctl restart cheddar-web || true
              sleep 5
              if [ -n "${CF_API_TOKEN:-}" ] && [ -n "${CF_ZONE_ID:-}" ]; then
                echo "Purging Cloudflare cache after rollback (purge_everything)..."
                curl -sS -X POST "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/purge_cache" \
                  -H "Authorization: Bearer ${CF_API_TOKEN}" \
                  -H "Content-Type: application/json" \
                  --data '{"purge_everything":true}' || true
              fi
            }
            fail_with_rollback() {
              message="$1"
              echo "ERROR: $message"
              restore_previous_next
              sudo journalctl -u cheddar-web -n 80 --no-pager || true
              exit 1
            }
            retry_url() {
              url="$1"
              label="$2"
              cache_bust="${3:-0}"
              attempts=12
              delay=3
              status=""
              for i in $(seq 1 "$attempts"); do
                probe_url="$url"
                if [ "$cache_bust" = "1" ]; then
                  sep='?'
                  case "$probe_url" in
                    *\?*) sep='&' ;;
                  esac
                  probe_url="${probe_url}${sep}cf_probe=$(date +%s)-${i}"
                fi
                LAST_RETRY_URL="$probe_url"
                status=$(curl -sS \
                  -H "Cache-Control: no-cache, no-store, must-revalidate" \
                  -H "Pragma: no-cache" \
                  -o /dev/null -w "%{http_code}" "$probe_url" || true)
                LAST_RETRY_STATUS="$status"
                if [ "$status" = "200" ]; then
                  echo "$label ok (status=$status)"
                  return 0
                fi
                echo "$label not ready (status=$status) attempt $i/$attempts"
                sleep "$delay"
              done
              echo "$label failed after $attempts attempts (last status=$status): $url"
              return 1
            }
            retry_url "http://127.0.0.1:3000/_next/static/chunks/$SAMPLE_CHUNK_REL" "origin sample chunk" || fail_with_rollback "origin sample chunk failed"
            retry_url "http://127.0.0.1:3000/_next/static/$SAMPLE_CSS_REL" "origin sample css" || fail_with_rollback "origin sample css failed"
            extract_asset_refs() {
              route="$1"
              html="$2"
              kind="$3"
              if [ "$kind" = "js" ]; then
                pattern='src="/_next/static/[^"]+\.js"'
              else
                pattern='href="/_next/static/[^"]+\.css"'
              fi
              printf "%s\n" "$html" \
                | grep -Eo "$pattern" \
                | sed -E 's#^(src|href)="([^"]+)"$#\2#' \
                | sed "s#^#${route}|#"
            }
            extract_route_ref_values() {
              refs="$1"
              route="$2"
              printf "%s\n" "$refs" \
                | awk -F'|' -v route="$route" '$1 == route && NF >= 2 { print $2 }' \
                | sort -u
            }
            ORIGIN_HOMEPAGE_HTML=$(curl -fsS "http://127.0.0.1:3000/" || true)
            ORIGIN_CARDS_HTML=$(curl -fsS "http://127.0.0.1:3000/cards" || true)
            ORIGIN_FPL_HTML=$(curl -fsS "http://127.0.0.1:3000/fpl" || true)
            ORIGIN_RESULTS_HTML=$(curl -fsS "http://127.0.0.1:3000/results" || true)
            ORIGIN_ROUTE_JS_REFS=$(
              {
                { extract_asset_refs "origin:/" "$ORIGIN_HOMEPAGE_HTML" "js"; } || true
                { extract_asset_refs "origin:/cards" "$ORIGIN_CARDS_HTML" "js"; } || true
                { extract_asset_refs "origin:/fpl" "$ORIGIN_FPL_HTML" "js"; } || true
                { extract_asset_refs "origin:/results" "$ORIGIN_RESULTS_HTML" "js"; } || true
              } | sort -u
            )
            ORIGIN_ROUTE_CSS_REFS=$(
              {
                { extract_asset_refs "origin:/" "$ORIGIN_HOMEPAGE_HTML" "css"; } || true
                { extract_asset_refs "origin:/cards" "$ORIGIN_CARDS_HTML" "css"; } || true
                { extract_asset_refs "origin:/fpl" "$ORIGIN_FPL_HTML" "css"; } || true
                { extract_asset_refs "origin:/results" "$ORIGIN_RESULTS_HTML" "css"; } || true
              } | sort -u
            )
            for route in "/" "/cards" "/fpl" "/results"; do
              ORIGIN_ROUTE_JS_COUNT=$(printf "%s\n" "$ORIGIN_ROUTE_JS_REFS" | awk -F'|' -v route="origin:${route}" '$1 == route { count++ } END { print count + 0 }')
              ORIGIN_ROUTE_CSS_COUNT=$(printf "%s\n" "$ORIGIN_ROUTE_CSS_REFS" | awk -F'|' -v route="origin:${route}" '$1 == route { count++ } END { print count + 0 }')
              test "$ORIGIN_ROUTE_JS_COUNT" -gt 0 || fail_with_rollback "route ${route} missing JS asset references in origin HTML"
              test "$ORIGIN_ROUTE_CSS_COUNT" -gt 0 || fail_with_rollback "route ${route} missing CSS asset references in origin HTML"
            done
            ORIGIN_JS_COUNT=$(printf "%s\n" "$ORIGIN_ROUTE_JS_REFS" | awk -F'|' 'NF >= 2 { print $2 }' | sort -u | grep -c . || true)
            ORIGIN_CSS_COUNT=$(printf "%s\n" "$ORIGIN_ROUTE_CSS_REFS" | awk -F'|' 'NF >= 2 { print $2 }' | sort -u | grep -c . || true)
            printf '%s\n' "$ORIGIN_ROUTE_JS_REFS" | while IFS='|' read -r route ref; do
              [ -n "$route" ] || continue
              [ -n "$ref" ] || continue
              retry_url "http://127.0.0.1:3000$ref" "origin js [$route] $ref" || fail_with_rollback "origin JS request failed route=$route ref=$ref status=${LAST_RETRY_STATUS:-unknown} url=${LAST_RETRY_URL:-http://127.0.0.1:3000$ref}"
            done
            printf '%s\n' "$ORIGIN_ROUTE_CSS_REFS" | while IFS='|' read -r route ref; do
              [ -n "$route" ] || continue
              [ -n "$ref" ] || continue
              retry_url "http://127.0.0.1:3000$ref" "origin css [$route] $ref" || fail_with_rollback "origin CSS request failed route=$route ref=$ref status=${LAST_RETRY_STATUS:-unknown} url=${LAST_RETRY_URL:-http://127.0.0.1:3000$ref}"
            done
            retry_public_route_refs() {
              route="$1"
              url="$2"
              expected_origin_route="origin:${route}"
              expected_js=$(extract_route_ref_values "$ORIGIN_ROUTE_JS_REFS" "$expected_origin_route")
              expected_css=$(extract_route_ref_values "$ORIGIN_ROUTE_CSS_REFS" "$expected_origin_route")
              attempts=12
              delay=5
              last_actual_js=""
              last_actual_css=""

              for i in $(seq 1 "$attempts"); do
                probe_url="$url"
                sep='?'
                case "$probe_url" in
                  *\?*) sep='&' ;;
                esac
                probe_url="${probe_url}${sep}cf_html_probe=$(date +%s)-${i}"
                html=$(curl -fsS \
                  -H "Cache-Control: no-cache, no-store, must-revalidate" \
                  -H "Pragma: no-cache" \
                  "$probe_url" || true)
                actual_js_refs=$(extract_asset_refs "public:${route}" "$html" "js" | sort -u)
                actual_css_refs=$(extract_asset_refs "public:${route}" "$html" "css" | sort -u)
                actual_js=$(extract_route_ref_values "$actual_js_refs" "public:${route}")
                actual_css=$(extract_route_ref_values "$actual_css_refs" "public:${route}")
                actual_js_count=$(printf "%s\n" "$actual_js" | grep -c . || true)
                actual_css_count=$(printf "%s\n" "$actual_css" | grep -c . || true)
                last_actual_js="$actual_js"
                last_actual_css="$actual_css"

                if [ "$actual_js_count" -eq 0 ] || [ "$actual_css_count" -eq 0 ]; then
                  echo "public route ${route} HTML missing asset refs (js=$actual_js_count css=$actual_css_count) attempt $i/$attempts"
                  sleep "$delay"
                  continue
                fi

                if [ "$actual_js" = "$expected_js" ] && [ "$actual_css" = "$expected_css" ]; then
                  LAST_PUBLIC_ROUTE_JS_REFS="$actual_js_refs"
                  LAST_PUBLIC_ROUTE_CSS_REFS="$actual_css_refs"
                  echo "public route ${route} HTML matches origin asset refs"
                  return 0
                fi

                echo "public route ${route} HTML asset refs differ from origin attempt $i/$attempts"
                sleep "$delay"
              done

              echo "public route ${route} HTML failed to match origin asset refs after $attempts attempts"
              echo "expected js refs for ${route}:"
              printf '%s\n' "$expected_js"
              echo "last public js refs for ${route}:"
              printf '%s\n' "$last_actual_js"
              echo "expected css refs for ${route}:"
              printf '%s\n' "$expected_css"
              echo "last public css refs for ${route}:"
              printf '%s\n' "$last_actual_css"
              return 1
            }
            PUBLIC_DOMAIN_URL="${NEXT_PUBLIC_PUBLIC_DOMAIN:-${PUBLIC_DOMAIN:-https://cheddarlogic.com}}"
            PUBLIC_DOMAIN_URL="${PUBLIC_DOMAIN_URL%/}"
            CF_PURGE_SKIPPED=false
            if [ -z "${CF_API_TOKEN:-}" ] || [ -z "${CF_ZONE_ID:-}" ]; then
              echo "WARNING: Cloudflare secrets (CF_API_TOKEN / CF_ZONE_ID) not set — skipping CF cache purge. Set them as GitHub Actions secrets to enable automatic purge on every deploy."
              CF_PURGE_SKIPPED=true
            else
              # purge_everything clears HTML routes AND /_next/static/ chunk cache.
              # Targeted URL-list purge previously left stale CF-cached 404s for new
              # chunk hashes when a prior failed deploy dirtied the static asset cache.
              curl -sS -X POST "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/purge_cache" \
                -H "Authorization: Bearer ${CF_API_TOKEN}" \
                -H "Content-Type: application/json" \
                --data '{"purge_everything":true}' \
                | tee /tmp/cloudflare_purge.json
              grep -Eq '"success"[[:space:]]*:[[:space:]]*true' /tmp/cloudflare_purge.json || fail_with_rollback "Cloudflare purge failed: $(cat /tmp/cloudflare_purge.json)"
              echo "Cloudflare cache purged (purge_everything) — waiting 45s for propagation..."
              sleep 45
            fi
            if [ "$CF_PURGE_SKIPPED" = "false" ]; then
              PUBLIC_ROUTE_JS_REFS=""
              PUBLIC_ROUTE_CSS_REFS=""
              for route in "/" "/cards" "/fpl" "/results"; do
                case "$route" in
                  /) echo "Checking public route / HTML convergence..." ;;
                  /cards) echo "Checking public route /cards HTML convergence..." ;;
                  /fpl) echo "Checking public route /fpl HTML convergence..." ;;
                  /results) echo "Checking public route /results HTML convergence..." ;;
                esac
                retry_public_route_refs "$route" "$PUBLIC_DOMAIN_URL$route" || fail_with_rollback "route ${route} public HTML did not converge to origin asset refs after purge"
                PUBLIC_ROUTE_JS_REFS=$(
                  {
                    printf '%s\n' "$PUBLIC_ROUTE_JS_REFS"
                    printf '%s\n' "$LAST_PUBLIC_ROUTE_JS_REFS"
                  } | sed '/^$/d' | sort -u
                )
                PUBLIC_ROUTE_CSS_REFS=$(
                  {
                    printf '%s\n' "$PUBLIC_ROUTE_CSS_REFS"
                    printf '%s\n' "$LAST_PUBLIC_ROUTE_CSS_REFS"
                  } | sed '/^$/d' | sort -u
                )
                PUBLIC_ROUTE_JS_COUNT=$(printf "%s\n" "$PUBLIC_ROUTE_JS_REFS" | awk -F'|' -v route="public:${route}" '$1 == route { count++ } END { print count + 0 }')
                PUBLIC_ROUTE_CSS_COUNT=$(printf "%s\n" "$PUBLIC_ROUTE_CSS_REFS" | awk -F'|' -v route="public:${route}" '$1 == route { count++ } END { print count + 0 }')
                test "$PUBLIC_ROUTE_JS_COUNT" -gt 0 || fail_with_rollback "route ${route} missing JS asset references in public HTML after purge"
                test "$PUBLIC_ROUTE_CSS_COUNT" -gt 0 || fail_with_rollback "route ${route} missing CSS asset references in public HTML after purge"
              done
              # ── WI-0636: Turbopack / dev-chunk guard ─────────────────────────────
              # If CF is serving HTML that references turbopack or HMR dev-mode chunks
              # (artifacts only produced by `next dev`, never `next build`), the retry
              # loops below will spend ~3 minutes on 12×3s timeouts per chunk before
              # failing with a misleading "public JS request failed" message.
              # This guard detects the bad refs immediately after HTML collection and
              # fails fast with a human-readable explanation.
              DEV_CHUNK_HIT=$(printf '%s\n' "$PUBLIC_ROUTE_JS_REFS" | awk -F'|' 'NF>=2 && tolower($2) ~ /turbopack|%5bturbopack%5d|_browser_dev_|hmr-client/ { print "route=" $1 " ref=" $2; exit }')
              if [ -n "$DEV_CHUNK_HIT" ]; then
                fail_with_rollback "CF served stale dev/turbopack HTML: ${DEV_CHUNK_HIT} — likely stale CF cache or a prior dev build was cached; re-run deploy after CF propagation completes"
              fi
              # ─────────────────────────────────────────────────────────────────────
              PUBLIC_JS_COUNT=$(printf "%s\n" "$PUBLIC_ROUTE_JS_REFS" | awk -F'|' 'NF >= 2 { print $2 }' | sort -u | grep -c . || true)
              PUBLIC_CSS_COUNT=$(printf "%s\n" "$PUBLIC_ROUTE_CSS_REFS" | awk -F'|' 'NF >= 2 { print $2 }' | sort -u | grep -c . || true)
              printf '%s\n' "$PUBLIC_ROUTE_JS_REFS" | while IFS='|' read -r route ref; do
                [ -n "$route" ] || continue
                [ -n "$ref" ] || continue
                retry_url "$PUBLIC_DOMAIN_URL$ref" "public js [$route] $ref" 1 || fail_with_rollback "public JS request failed route=$route ref=$ref status=${LAST_RETRY_STATUS:-unknown} url=${LAST_RETRY_URL:-$PUBLIC_DOMAIN_URL$ref}"
              done
              printf '%s\n' "$PUBLIC_ROUTE_CSS_REFS" | while IFS='|' read -r route ref; do
                [ -n "$route" ] || continue
                [ -n "$ref" ] || continue
                retry_url "$PUBLIC_DOMAIN_URL$ref" "public css [$route] $ref" 1 || fail_with_rollback "public CSS request failed route=$route ref=$ref status=${LAST_RETRY_STATUS:-unknown} url=${LAST_RETRY_URL:-$PUBLIC_DOMAIN_URL$ref}"
              done
              if [ -n "$PREV_ARCHIVED_ASSET_REL" ]; then
                retry_url "http://127.0.0.1:3000/_next/static/$PREV_ARCHIVED_ASSET_REL" "origin previous-release asset /_next/static/$PREV_ARCHIVED_ASSET_REL" || fail_with_rollback "previous-release origin static asset failed after deploy"
                retry_url "$PUBLIC_DOMAIN_URL/_next/static/$PREV_ARCHIVED_ASSET_REL" "public previous-release asset /_next/static/$PREV_ARCHIVED_ASSET_REL" 1 || fail_with_rollback "previous-release public static asset failed after deploy"
              else
                echo "No prior static snapshot asset available for previous-release retention check"
              fi
              echo "Chunk verification passed: origin served $ORIGIN_JS_COUNT JS refs and $ORIGIN_CSS_COUNT CSS refs; public served $PUBLIC_JS_COUNT JS refs and $PUBLIC_CSS_COUNT CSS refs from /, /cards, /fpl, and /results HTML"
            else
              echo "Chunk verification (origin): origin served $ORIGIN_JS_COUNT JS refs and $ORIGIN_CSS_COUNT CSS refs — CF purge skipped (no secrets)"
            fi
            DEPLOY_LOG="/opt/cheddar-logic/logs/deploy.log"
            mkdir -p "$(dirname "$DEPLOY_LOG")"
            node - <<'NODE' | tee -a "$DEPLOY_LOG"
            const endpoints = [
              { name: 'api/games', url: 'http://127.0.0.1:3000/api/games' },
              { name: 'api/cards', url: 'http://127.0.0.1:3000/api/cards?limit=5' },
            ];

            const now = new Date().toISOString();
            const stats = {
              warnings: 0,
              infos: 0,
              endpointSummary: {},
            };

            const warn = (message) => {
              stats.warnings += 1;
              console.warn(`[deploy-warn] ${now} ${message}`);
            };

            const info = (message) => {
              stats.infos += 1;
              console.log(`[deploy-info] ${now} ${message}`);
            };

            async function checkEndpoint({ name, url }) {
              const endpointStats = {
                status: null,
                success: null,
                dataCount: null,
                warnings: 0,
              };

              let response;
              try {
                response = await fetch(url, { headers: { 'Accept': 'application/json' } });
              } catch (err) {
                endpointStats.warnings += 1;
                warn(`${name} request failed: ${err.message}`);
                stats.endpointSummary[name] = endpointStats;
                return;
              }

              if (!response.ok) {
                endpointStats.warnings += 1;
                warn(`${name} returned HTTP ${response.status}`);
              }
              endpointStats.status = response.status;
              info(`${name} status=${response.status}`);

              const contentType = (response.headers.get('content-type') || '').toLowerCase();
              info(`${name} content-type=${contentType || 'unknown'}`);
              const rawText = await response.text();
              const snippet = rawText ? rawText.slice(0, 220).replace(/\s+/g, ' ').trim() : '';
              let payload = null;
              if (contentType.includes('application/json')) {
                try {
                  payload = JSON.parse(rawText);
                } catch (err) {
                  endpointStats.warnings += 1;
                  warn(`${name} returned invalid JSON (${err.message})`);
                  if (snippet) warn(`${name} body-snippet="${snippet}"`);
                }
              } else {
                endpointStats.warnings += 1;
                warn(`${name} returned non-JSON content-type: ${contentType || 'unknown'}`);
                if (snippet) warn(`${name} body-snippet="${snippet}"`);
              }

              if (!payload) {
                stats.endpointSummary[name] = endpointStats;
                return;
              }

              if (payload.success === false) {
                endpointStats.warnings += 1;
                warn(`${name} success=false${payload.error ? ` (${payload.error})` : ''}`);
              }
              endpointStats.success = payload.success === true;

              const dataCount = Array.isArray(payload.data) ? payload.data.length : null;
              if (dataCount !== null) {
                info(`${name} data count: ${dataCount}`);
                if (dataCount === 0) {
                  endpointStats.warnings += 1;
                  warn(`${name} returned empty data`);
                }
              }
              endpointStats.dataCount = dataCount;

              stats.endpointSummary[name] = endpointStats;
            }

            (async () => {
              for (const endpoint of endpoints) {
                await checkEndpoint(endpoint);
              }

              const compact = Object.entries(stats.endpointSummary)
                .map(([name, s]) => `${name}:status=${s.status ?? 'n/a'},success=${s.success === null ? 'n/a' : s.success},count=${s.dataCount ?? 'n/a'},warn=${s.warnings}`)
                .join(' | ');
              console.log(
                `[deploy-summary] ${now} warnings=${stats.warnings} infos=${stats.infos} endpoints=[${compact}]`,
              );
            })().catch((err) => {
              warn(`API checks failed: ${err.message}`);
              console.log(
                `[deploy-summary] ${now} warnings=${stats.warnings} infos=${stats.infos} endpoints=[error-path]`,
              );
            });
            NODE
            echo "Deploy complete — worker, web, and fpl-sage restarted"
